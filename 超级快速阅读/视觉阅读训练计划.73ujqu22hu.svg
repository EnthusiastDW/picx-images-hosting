71.45" x="22" textLength="96" style="white-space:pre">训练计划</tspan></text><g ed:note="&lt;body style=&quot; font-family:'SimSun'; font-size:9pt; font-weight:400; font-style:normal;&quot;>&lt;p style=&quot; margin-top:0px; margin-bottom:0px; margin-left:0px; margin-right:0px; -qt-block-indent:0; text-indent:0px; &quot;>&lt;span style=&quot; font-family:'Arial'; color:#1e1e1e;&quot;>每天20分钟；&lt;/span>&lt;/p>&lt;p style=&quot;-qt-paragraph-type:empty; margin-top:0px; margin-bottom:0px; margin-left:0px; margin-right:0px; -qt-block-indent:0; text-indent:0px;  font-family:'Arial'; color:#1e1e1e;&quot;>&lt;br />&lt;/p>&lt;p style=&quot; margin-top:0px; margin-bottom:0px; margin-left:0px; margin-right:0px; -qt-block-indent:0; text-indent:0px; &quot;>&lt;span style=&quot; font-family:'Arial'; color:#1e1e1e;&quot;>第一天：辅助阅读；&lt;/span>&lt;/p>&lt;p style=&quot; margin-top:0px; margin-bottom:0px; margin-left:0px; margin-right:0px; -qt-block-indent:0; text-indent:0px; &quot;>&lt;span style=&quot; font-family:'Arial'; color:#1e1e1e;&quot;>第二天：从每行第二个字开始移动辅助工具，并提前一个字换行，一次拓宽视线范围；&lt;/span>&lt;/p>&lt;p style=&quot; margin-top:0px; margin-bottom:0px; margin-left:0px; margin-right:0px; -qt-block-indent:0; text-indent:0px; &quot;>&lt;span style=&quot; font-family:'Arial'; color:#1e1e1e;&quot;>第三天—N天：尝试3-2-1练习，直到适应节奏；&lt;/span>&lt;/p>&lt;p style=&quot; margin-top:0px; margin-bottom:0px; margin-left:0px; margin-right:0px; -qt-block-indent:0; text-indent:0px; &quot;>&lt;span style=&quot; font-family:'Arial'; color:#1e1e1e;&quot;>第二周：融入视觉卡片，交替3-2-1练习和3-2-1练习升级版，有时逐行，有时S曲线阅读拓宽视线范围。&lt;/span>&lt;/p>&lt;/body>"><use transform="translate(145,37)" xlink:href="#imgnote"/></g><g ed:hyperlink="[&#xa;    {&#xa;        &quot;desc&quot;: &quot;&quot;,&#xa;        &quot;link&quot;: &quot;212&quot;&#xa;    }&#xa;]&#xa;"><use transform="translate(124,37)" xlink:href="#imghyperlink"/></g></g><symbol id="imgnote"><image width="16" xlink:href="data:image/png;base64," height="16"/></symbol><symbol id="imghyperlink"><image width="16" xlink:href="data:image/png;base64," height="16"/></symbol></svg>